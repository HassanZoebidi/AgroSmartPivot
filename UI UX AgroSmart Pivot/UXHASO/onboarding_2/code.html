<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Precision Field - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#d02d2d",
                        "on-background": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "primary": "#0d631b",
                        "primary-fixed": "#a3f69c",
                        "tertiary-fixed": "#ffdad6",
                        "on-secondary-fixed": "#001c3a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-primary-fixed-variant": "#005312",
                        "surface-variant": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "outline-variant": "#bfcaba",
                        "on-primary-container": "#cbffc2",
                        "secondary": "#005faf",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#004786",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "secondary-fixed-dim": "#a5c8ff",
                        "on-primary-fixed": "#002204",
                        "secondary-container": "#54a0fe",
                        "on-tertiary-fixed-variant": "#930010",
                        "outline": "#707a6c",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed": "#410003",
                        "tertiary": "#ac0c18",
                        "primary-container": "#2e7d32",
                        "inverse-surface": "#2e3132",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-secondary-container": "#003567",
                        "on-surface-variant": "#40493d",
                        "on-tertiary-container": "#ffedeb",
                        "inverse-primary": "#88d982",
                        "surface-container-low": "#f3f4f5",
                        "surface-container": "#edeeef",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#d4e3ff",
                        "surface-tint": "#1b6d24",
                        "primary-fixed-dim": "#88d982"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #0d631b 0%, #2e7d32 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Canvas Area (Onboarding Flow) -->
<main class="w-full max-w-md h-full flex flex-col relative px-6 py-12">
<!-- Top 'Skip' Action -->
<div class="flex justify-end w-full mb-8">
<button class="text-on-surface-variant font-bold text-sm tracking-wide uppercase px-4 py-2 hover:bg-surface-container-low rounded-xl transition-colors">
                Skip
            </button>
</div>
<!-- Illustration Area (Atmospheric Precision) -->
<div class="flex-grow flex items-center justify-center relative mb-12">
<!-- Asymmetrical/High-end visual container -->
<div class="relative w-full aspect-square max-w-[320px] rounded-[2rem] overflow-hidden shadow-[0_12px_32px_rgba(25,28,29,0.06)] bg-surface-container-lowest flex items-center justify-center p-8">
<!-- Abstract Representation of AI/Drone scanning -->
<div class="absolute inset-0 bg-surface-container-low opacity-50"></div>
<!-- Stylized Image Placeholder -->
<img alt="Field Scanning" class="w-full h-full object-cover rounded-xl z-10" data-alt="High-contrast top-down view of neat agricultural crop rows being scanned by a drone shadow, warm sunlight, precision ag-tech aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGFX52E9FgYw-XvdWFZw98ulesba8bb0jBGr8iewwqP8dn2MeI3Ej6UVFLPEg2vrUqzuzURJRr9tJqFe5xlHZbFtc8dX3b48vhxxJ1mA6uCmaX641VdNc_uvwaeLzGq_LV6B2f3Nd065idmDeGABONN3VnWMRvQ77TaeB02uMZG_8JHLAp121_I6RcGWBTR13DkN28woEzbqSbzNNvDrlL5AC7xH3SNU3bB_DwDUgeKZj0rz50uJ9n_7LeR34ZQHnCgW9cF6iqDf2M"/>
<!-- Overlay UI elements simulating "AI Detection" -->
<div class="absolute top-1/4 left-1/4 w-12 h-12 border-2 border-primary rounded-lg z-20 flex items-center justify-center bg-surface-container-lowest/80 backdrop-blur-md">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<div class="absolute bottom-1/3 right-1/4 w-16 h-16 border-2 border-error rounded-lg z-20 flex items-center justify-center bg-surface-container-lowest/80 backdrop-blur-md">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Scanning line effect -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-secondary z-30 shadow-[0_0_10px_#005faf]"></div>
</div>
</div>
<!-- Typography & Content -->
<div class="flex flex-col items-start w-full mb-auto pr-8">
<!-- Headline-LG -->
<h1 class="font-headline font-bold text-[2rem] leading-tight text-on-surface mb-4">
                AI Detects Weeds
            </h1>
<!-- Body-LG -->
<p class="font-body text-base text-on-surface-variant leading-relaxed">
                Advanced optical sensors identify invasive species in real-time, allowing for pinpoint eradication without damaging the surrounding crop.
            </p>
</div>
<!-- Bottom Controls -->
<div class="flex items-center justify-between w-full mt-12 pb-6">
<!-- 3-Dot Progress Indicator -->
<div class="flex space-x-2">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<!-- Active Dot -->
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- 'Next' Button (Primary CTA) -->
<button class="signature-gradient text-on-primary font-bold text-[1.125rem] h-[56px] px-8 rounded-xl flex items-center justify-center shadow-[0_12px_32px_rgba(25,28,29,0.06)] active:scale-95 transition-transform">
                Next
            </button>
</div>
</main>
</body></html>
