<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Precision Field - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#d02d2d",
                        "on-background": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "primary": "#0d631b",
                        "primary-fixed": "#a3f69c",
                        "tertiary-fixed": "#ffdad6",
                        "on-secondary-fixed": "#001c3a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-primary-fixed-variant": "#005312",
                        "surface-variant": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "outline-variant": "#bfcaba",
                        "on-primary-container": "#cbffc2",
                        "secondary": "#005faf",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#004786",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "secondary-fixed-dim": "#a5c8ff",
                        "on-primary-fixed": "#002204",
                        "secondary-container": "#54a0fe",
                        "on-tertiary-fixed-variant": "#930010",
                        "outline": "#707a6c",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed": "#410003",
                        "tertiary": "#ac0c18",
                        "primary-container": "#2e7d32",
                        "inverse-surface": "#2e3132",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-secondary-container": "#003567",
                        "on-surface-variant": "#40493d",
                        "on-tertiary-container": "#ffedeb",
                        "inverse-primary": "#88d982",
                        "surface-container-low": "#f3f4f5",
                        "surface-container": "#edeeef",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#d4e3ff",
                        "surface-tint": "#1b6d24",
                        "primary-fixed-dim": "#88d982"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #0d631b, #2e7d32);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container - Asymmetrical split for desktop, single column for mobile -->
<div class="w-full max-w-6xl mx-auto flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl bg-surface-container-low min-h-[800px]">
<!-- Left Side: Editorial Image/Branding -->
<div class="hidden md:flex md:w-5/12 relative bg-surface-container-highest items-end p-12">
<!-- Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Agricultural field" class="w-full h-full object-cover grayscale opacity-40 mix-blend-multiply" data-alt="Wide shot of a massive circular center-pivot irrigation system over a lush green field under bright direct sunlight, deep shadows, high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAC-X1B6rIRLSNQBbgYWse3lF44ARC2My7AmJHAUVZSqJNV3DSkovs-RGnC1WSpKAEAv-Z2KV5s1D_L5qvzm6qgmd0alpl0LdE0Z1rQbepkIY72IavxmXWYBOejYf17cNsxjx6EOr6Y3QhKOi81ZMFQO_Qh8xZbFDKJl0xru1DsUEq1gxn_N_fZV71VEw8U81-PsU_0eh4B_nEu1KrCbOJKcFXkU9QZkkRHA_U5nqcwxZvu5M1SjzsHgqEY9umOf717ZXaGkQzksEr"/>
</div>
<!-- Branding Content -->
<div class="relative z-10 w-full">
<h1 class="font-headline font-black text-6xl text-primary tracking-tighter mb-4">Precision<br/>Field</h1>
<p class="font-body text-body-lg text-on-surface-variant font-bold max-w-sm">
                    Atmospheric Precision.<br/>
                    Command your resources with high-stakes clarity.
                </p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-7/12 p-8 md:p-16 lg:p-24 flex flex-col justify-center relative bg-surface-container-lowest z-10">
<!-- Mobile Header (Hidden on Desktop) -->
<div class="md:hidden mb-12">
<h1 class="font-headline font-black text-4xl text-primary tracking-tighter">Precision Field</h1>
</div>
<div class="max-w-md w-full mx-auto">
<h2 class="font-headline text-headline-lg font-bold text-on-surface mb-2 tracking-tight">Access Control</h2>
<p class="text-on-surface-variant text-body-lg mb-12">Enter your credentials to connect to the network.</p>
<form class="space-y-8">
<!-- Email Input -->
<div class="relative">
<label class="block font-label text-title-md font-bold text-on-surface mb-2" for="email">Operator ID</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
</span>
<input class="block w-full h-16 pl-12 pr-4 bg-surface-container-high border-0 border-b-2 border-primary focus:ring-0 focus:border-primary text-on-surface font-body text-lg transition-colors" id="email" name="email" placeholder="email@precisionfield.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<div class="flex justify-between items-center mb-2">
<label class="block font-label text-title-md font-bold text-on-surface" for="password">Security Key</label>
<a class="text-sm font-bold text-secondary hover:underline" href="#">Reset Key</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">lock</span>
</span>
<input class="block w-full h-16 pl-12 pr-4 bg-surface-container-high border-0 border-b-2 border-primary focus:ring-0 focus:border-primary text-on-surface font-body text-lg transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Main Action -->
<button class="w-full h-14 signature-gradient text-on-primary font-headline font-bold text-title-md rounded-xl shadow-[0_12px_32px_rgba(25,28,29,0.06)] active:scale-95 transition-transform duration-200 mt-12 flex justify-center items-center gap-2" type="submit">
<span>Initialize Connection</span>
<span class="material-symbols-outlined text-on-primary">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-16 flex items-center">
<div class="flex-grow h-px bg-outline-variant opacity-30"></div>
<span class="px-4 text-on-surface-variant font-bold text-sm uppercase tracking-widest">or authorize via</span>
<div class="flex-grow h-px bg-outline-variant opacity-30"></div>
</div>
<!-- Secondary Actions -->
<div class="mt-8 flex flex-col space-y-4">
<button class="w-full h-14 bg-secondary-container text-on-secondary-container font-headline font-bold text-title-md rounded-xl active:scale-95 transition-transform duration-200 flex justify-center items-center gap-3" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
<span>Enterprise Sign-In</span>
</button>
</div>
<div class="mt-12 text-center">
<p class="text-on-surface-variant font-body">
                        New operator? <a class="text-primary font-bold hover:underline" href="#">Register Equipment</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
